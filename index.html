<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roblox Projects</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      text-align: center;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("bkg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(18px) brightness(0.55);
      transform: scale(1.15);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(0, 0, 0, 0.45),
        rgba(0, 0, 0, 0.65)
      );
      z-index: -1;
    }

    header {
      padding: 60px 20px 40px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    table {
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
      border-collapse: collapse;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    th {
      background: rgba(255, 255, 255, 0.15);
      font-size: 1.1rem;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    footer a {
      color: #00d4ff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <header>
    <h1>My Roblox Projects</h1>
  </header>

  <table id="gameTable">
    <thead>
      <tr>
        <th>Universe ID</th>
        <th>Name</th>
        <th>Creator</th>
        <th>Visits</th>
        <th>Playing</th>
        <th>Coming Soon?</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <footer>
    Made by 
    <a href="https://www.roblox.com/users/7068332763/profile" target="_blank">
      cre4te_it
    </a>
  </footer>
<script>
const projects = [
  { id: 117440884882893, comingSoon: true },
];

async function loadGames() {
  const tableBody = document.querySelector("#gameTable tbody");

  for (const project of projects) {
    const apiURL = `https://games.roblox.com/v1/games?universeIds=${project.id}`;
    const proxiedURL = `https://corsproxy.io/?${encodeURIComponent(apiURL)}`;

    try {
      const response = await fetch(proxiedURL);
      const data = await response.json();

      if (!data.data || !data.data[0]) {
        throw new Error("Invalid universe ID");
      }

      const game = data.data[0];

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${project.id}</td>
        <td>${game.name}</td>
        <td>${game.creator.name}</td>
        <td>${game.visits.toLocaleString()}</td>
        <td>${game.playing.toLocaleString()}</td>
        <td>${project.comingSoon ? "Yes" : "No"}</td>
      `;

      tableBody.appendChild(row);

    } catch (err) {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${project.id}</td>
        <td colspan="5" style="color: #ff6b6b;">Failed to load game data</td>
      `;
      tableBody.appendChild(row);
    }
  }
}

loadGames();
</script>


</body>
</html>
