<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roblox Projects</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2d2d44);
      color: #ffffff;
      text-align: center;
    }

    header {
      padding: 60px 20px 40px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .username a {
      font-size: 1.4rem;
      color: #00d4ff;
      text-decoration: none;
      font-weight: bold;
    }

    .username a:hover {
      color: #7af0ff;
      text-shadow: 0 0 8px #00d4ff;
    }

    .projects-section {
      margin-top: 40px;
      padding: 20px;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    footer a {
      color: #00d4ff;
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      color: #7af0ff;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 25px;
      width: 80%;
      max-width: 600px;
      margin: 20px auto;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>

<body>
  <header>
    <h1>My Roblox Projects</h1>
    <div class="username">
      <a href="https://www.roblox.com/users/7068332763/profile" target="_blank">
        cre4te_it
      </a>
    </div>
  </header>

  <section class="projects-section">
    <div class="card">
      <h2>Featured Projects</h2>
      <p>Coming soon...</p>
    </div>
  </section>

  <footer>
    Made by 
    <a href="https://www.roblox.com/users/7068332763/profile" target="_blank">
      cre4te_it
    </a>
  </footer>
</body>
</html>
